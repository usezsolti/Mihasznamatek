[alembic]
# migrációs fájlok helye
script_location = backend/alembic

# adatbázis URL: vagy írd be ide, vagy használd az env.py-ben
sqlalchemy.url = postgresql://user:pass@localhost:5432/mihaszna_matek

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
