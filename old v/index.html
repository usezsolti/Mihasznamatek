<body>

  <nav>
    <!-- Bal oldalon csak a logó -->
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="48" height="48">
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#39FF14"/>
            <stop offset="100%" stop-color="#FF49DB"/>
          </linearGradient>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <text x="40%" y="60%" text-anchor="middle"
              font-family="Montserrat, sans-serif" font-weight="700" font-size="100"
              fill="url(#grad)" filter="url(#glow)">∑</text>
        <text x="60%" y="60%" text-anchor="middle"
              font-family="Montserrat, sans-serif" font-weight="700" font-size="100"
              fill="url(#grad)" filter="url(#glow)">∫</text>
      </svg>
    </div>

<!-- Saját JS: initMap és geocoder-hívás -->

<!-- Google Maps JS API: kulcs+callback -->
<script

<!-- EMAIL SZEKCIÓ -->
<section id="email" class="section email-section">
  <div class="section-content">
    <h2>Írj nekem</h2>
    <form id="email-form">
      <input type="text" name="user_name"    placeholder="Név"  required>
      <input type="email" name="user_email"  placeholder="Email" required>
      <textarea name="message"               placeholder="Üzenet" rows="5" required></textarea>
      <button type="submit" class="btn btn-neon-pink">Küldés</button>
    </form>
    <p id="form-status" style="margin-top:1rem;"></p>
  </div>
</section>

<!-- index.html HEAD-ben -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="style.css">

<section class="auth-section">
    <div class="auth-box">

      <!-- csak a regisztráció fül -->
      <h2>Diák fiók</h2>
      <button id="go-register" class="btn btn-neon-green">Regisztráció</button>

      <!-- és a bejelentkezés -->
      <h3>Bejelentkezés</h3>
      <form id="login-form" class="auth-form">
        <input type="email"    id="login-email"    placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Jelszó" required>
        <button type="submit" class="btn btn-neon-green">Bejelentkezés</button>
        <p class="form-msg" id="login-msg"></p>
      </form>

    </div>
  </section>

  <script>
    // Regisztráció gomb átirányít
    document.getElementById('go-register').addEventListener('click', () => {
      window.location.href = 'register.html';
    });
  </script>
